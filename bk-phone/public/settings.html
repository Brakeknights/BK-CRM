<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b2a">
  <title>Settings · Brake Knights Phone</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/settings.css">
  <script>(function(){var t=localStorage.getItem('bkphone-theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
</head>
<body>
  <div class="app">

    <header class="app-header">
      <button class="back-btn" id="back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
        </svg>
      </button>
      <div class="thread-header-info"><span class="name">Settings</span></div>
    </header>

    <div class="content">
      <!-- Account -->
      <div class="settings-section">
        <div class="settings-label">Account</div>
        <div class="settings-card">
          <div class="settings-row static">
            <img class="acct-logo" src="/icons/icon-192.png" alt="" onerror="this.style.display='none'">
            <div>
              <div class="acct-name">Brake Knights</div>
              <div class="acct-sub" id="acct-number">&nbsp;</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Notifications -->
      <div class="settings-section">
        <div class="settings-label">Notifications</div>
        <div class="settings-card">
          <button class="settings-row" id="notif-row">
            <span>Text notifications</span>
            <span class="settings-value" id="notif-value">Off</span>
          </button>
        </div>
        <div class="settings-hint" id="notif-hint">Get an alert when a customer texts, even when the app is closed.</div>
      </div>

      <!-- Appearance -->
      <div class="settings-section">
        <div class="settings-label">Appearance</div>
        <div class="settings-card">
          <button class="settings-row" id="theme-row">
            <span>Theme</span>
            <span class="settings-value" id="theme-value">Dark</span>
          </button>
        </div>
        <div class="settings-hint">Tap to switch between dark and light.</div>
      </div>

      <!-- Sign out -->
      <div class="settings-section">
        <form method="POST" action="/logout">
          <button type="submit" class="btn btn-danger btn-block">Log out</button>
        </form>
      </div>

      <div class="settings-version" id="version">Brake Knights Phone · build 8</div>
    </div>

  </div>

  <script src="/js/app.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
