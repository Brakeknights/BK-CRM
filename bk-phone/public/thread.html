<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b2a">
  <title>Brake Knights Phone</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css?v=11">
  <script>(function(){var t=localStorage.getItem('bkphone-theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
</head>
<body>
  <div class="app">

    <!-- Header: back, customer name, View Profile -->
    <header class="app-header">
      <button class="back-btn" id="back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
        </svg>
      </button>
      <div class="thread-header-info">
        <span class="name" id="hdr-name">&nbsp;</span>
        <span class="sub" id="hdr-sub"></span>
      </div>
      <span class="spacer"></span>
      <a class="icon-btn" id="profile-link" target="_blank" rel="noopener" title="View customer profile" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
      </a>
    </header>

    <!-- Messages -->
    <div class="content" id="content">
      <div class="spinner" id="loading"></div>
      <div class="messages" id="messages"></div>
    </div>

    <!-- Composer -->
    <div class="composer">
      <div class="quick-replies" id="quick-replies"></div>
      <div class="composer-row">
        <textarea id="input" placeholder="Text message" rows="1"></textarea>
        <button class="send-btn" id="send" aria-label="Send" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="/js/app.js?v=11"></script>
  <script src="/js/thread.js?v=11"></script>
</body>
</html>
